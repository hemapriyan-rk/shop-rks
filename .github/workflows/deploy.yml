name: Deploy to Render

# ════════════════════════════════════════════════════════════════════
# Triggers Render auto-deploy on push to main branch.
#
# SETUP REQUIRED:
#   1. In Render Dashboard → Web Service → Settings → Deploy Hook
#      Copy the Deploy Hook URL
#   2. In GitHub → Settings → Secrets and Variables → Actions
#      Add secret: RENDER_DEPLOY_HOOK_URL = <paste the URL>
#   3. Push to main — this workflow will trigger the Render deploy
#
# NOTE: Render also auto-deploys via GitHub integration (no webhook
# needed if you connected GitHub in Render). This workflow is an
# explicit backup trigger and deploy status notifier.
# ════════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering Render deploy for shop-rks..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Deploy trigger failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Log deployment info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deployment triggered for shop-rks"
          echo "  Branch : main"
          echo "  Commit : ${{ github.sha }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "  Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Monitor deploy at: https://dashboard.render.com"
